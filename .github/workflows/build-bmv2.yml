name: build-bmv2-image

# Builds the prebuilt BMv2 + p4c image and publishes it to GHCR so FABRIC switch
# nodes can `docker pull` instead of compiling from source. Runs on changes to the
# Dockerfile or the P4 toolchain inputs, and on demand.
on:
  workflow_dispatch:
  push:
    paths:
      - 'docker/Dockerfile.bmv2'
      - '.github/workflows/build-bmv2.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.bmv2
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/qfabric-bmv2:latest
            ghcr.io/${{ github.repository_owner }}/qfabric-bmv2:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
