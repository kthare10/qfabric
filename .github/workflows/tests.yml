name: tests

# Lint + unit tests + a simulation-mode cross-validation smoke. Runs on every
# push/PR; no FABRIC slice or simulators required (the QFabric pure-Python path
# always runs, SeQUeNCe/NetSquid are reported SKIPPED).
on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Install (dev extras: pytest, ruff)"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check qne validation scripts tests

      - name: Pytest
        run: pytest tests/ -q

      - name: Cross-validation smoke (QFabric simulation)
        run: python -m validation.compare validation/scenarios/baseline_1km.yml
